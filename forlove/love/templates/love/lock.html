{% extends 'love/base.html' %}

{% block content %}

<div class="page fade-in">

    <h1>🔒 Secret Page</h1>

    <p>Enter the password to continue ❤️
        ps: Enter Birthday😉
    </p>

    <input type="password"
           id="password"
           placeholder="Enter password">

    <br><br>

    <button onclick="checkPassword()">
        Unlock ❤️
    </button>

</div>

<script>

function checkPassword(){

    let pass =
        document.getElementById("password").value;

    if(pass === "11082005"){

        window.location.href = "/secret/";

    }else{

        alert("Wrong Password ❤️");
    }
}

</script>

{% endblock %}
