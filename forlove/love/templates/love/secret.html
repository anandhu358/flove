{% extends 'love/base.html' %}

{% block content %}

<div class="page fade-in">

    <h1>❤️ A Letter For You ❤️</h1>

    <div class="letter-box">

        <p id="letter"></p>

    </div>

</div>

<script>

const text = `
Dear Love,

You have made ordinary days feel extraordinary.

Thank you for every smile,
every laugh,
every memory.

No matter what happens,
I will always be grateful
that our paths crossed.

❤️
`;

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("letter").innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter,50);
    }
}

typeWriter();

</script>

{% endblock %}
